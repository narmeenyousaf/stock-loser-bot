name: Send Daily Losers Report

on:
  schedule:
    - cron: '0 10 * * *'  # 12 PM CET = 10 AM UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          CLIENT_EMAIL: ${{ secrets.CLIENT_EMAIL }}
        run: |
          sed -i "s/your_email@gmail.com/$EMAIL_USER/g" losers_report.py
          sed -i "s/your_app_password/$EMAIL_PASS/g" losers_report.py
          sed -i "s/client_email@example.com/$CLIENT_EMAIL/g" losers_report.py
          python losers_report.py
